services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: agentdb
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_USER: ${MYSQL_APP_USER:-agent_app}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD:-agent_app_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-mysql}
      MYSQL_JDBC_URL: jdbc:mysql://mysql:3306/agentdb?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      MYSQL_USERNAME: ${MYSQL_APP_USER:-agent_app}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD:-agent_app_password}
      MYSQL_FLYWAY_ENABLED: ${MYSQL_FLYWAY_ENABLED:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-5.4}
      OPENAI_CHAT_COMPLETIONS_PATH: ${OPENAI_CHAT_COMPLETIONS_PATH:-/chat/completions}
      OPENAI_EMBEDDING_PROVIDER: ${OPENAI_EMBEDDING_PROVIDER:-none}
      OPENAI_EMBEDDING_ENABLED: ${OPENAI_EMBEDDING_ENABLED:-false}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDINGS_PATH: ${OPENAI_EMBEDDINGS_PATH:-/embeddings}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - app-storage:/app/storage
    restart: unless-stopped

volumes:
  mysql-data:
  app-storage:
