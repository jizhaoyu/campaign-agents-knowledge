name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run backend tests
        run: mvn test

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run frontend E2E tests
        working-directory: frontend
        run: npx playwright test

      - name: Package full-stack jar
        run: mvn -Pfrontend -DskipTests package

      - name: Verify jar contains frontend assets
        shell: bash
        run: |
          jar tf target/knowledge-ticket-agent-0.0.1-SNAPSHOT.jar | grep 'BOOT-INF/classes/static/index.html'
          jar tf target/knowledge-ticket-agent-0.0.1-SNAPSHOT.jar | grep 'BOOT-INF/classes/static/assets/index.js'
          jar tf target/knowledge-ticket-agent-0.0.1-SNAPSHOT.jar | grep 'BOOT-INF/classes/static/assets/index.css'
